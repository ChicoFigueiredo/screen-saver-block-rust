name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da release (ex.: v1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Publicar como pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows binary
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package zip asset
        shell: pwsh
        run: |
          $bin = "target/release/screen-saver-blocker-rust.exe"
          if (!(Test-Path $bin)) {
            throw "Binary not found at $bin"
          }

          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item $bin "dist/screen-saver-blocker-rust.exe"
          Compress-Archive -Path "dist/screen-saver-blocker-rust.exe" -DestinationPath "dist/screen-saver-blocker-windows-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-asset
          path: dist/screen-saver-blocker-windows-x64.zip

  publish-release:
    name: Publish GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release-asset
          path: dist

      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.value }}
          name: Release ${{ steps.resolve_tag.outputs.value }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease == true }}
          files: |
            dist/screen-saver-blocker-windows-x64.zip
