name: PR Windows Build and Release

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  pr-build-check:
    name: PR build check (Windows)
    if: ${{ github.event.action != 'closed' }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

  create-tag:
    name: Auto-increment tag on merge
    if: ${{ github.event.action == 'closed' && github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.next_tag.outputs.value }}

    steps:
      - name: Checkout main with full history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute next patch tag
        id: next_tag
        shell: bash
        run: |
          semver_tags=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+(\.[0-9]+)?$' || true)

          if [[ -z "$semver_tags" ]]; then
            major=0
            minor=1
            patch=0
          else
            # Normaliza vX.Y para vX.Y.0 para ordenar corretamente.
            normalized_tags=$(printf "%s\n" "$semver_tags" | sed -E 's/^v([0-9]+\.[0-9]+)$/v\1.0/')
            latest_tag=$(printf "%s\n" "$normalized_tags" | sort -V | tail -n 1)

            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
            patch=$((patch + 1))
          fi

          next_tag="v${major}.${minor}.${patch}"

          # Evita colisão de tag (ex.: rerun ou concorrência eventual).
          while git rev-parse -q --verify "refs/tags/$next_tag" >/dev/null || \
                git ls-remote --tags origin "refs/tags/$next_tag" | grep -q "$next_tag"; do
            patch=$((patch + 1))
            next_tag="v${major}.${minor}.${patch}"
          done

          echo "value=$next_tag" >> "$GITHUB_OUTPUT"
          echo "Próxima tag: $next_tag"

      - name: Create and push tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next_tag.outputs.value }}"
          git push origin "${{ steps.next_tag.outputs.value }}"

  build-release-asset:
    name: Build Windows release asset
    needs: create-tag
    runs-on: windows-latest

    steps:
      - name: Checkout created tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.tag }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package zip asset
        shell: pwsh
        run: |
          $bin = "target/release/screen-saver-blocker-rust.exe"
          if (!(Test-Path $bin)) {
            throw "Binary not found at $bin"
          }

          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item $bin "dist/screen-saver-blocker-rust.exe"
          Compress-Archive -Path "dist/screen-saver-blocker-rust.exe" -DestinationPath "dist/screen-saver-blocker-windows-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-asset
          path: dist/screen-saver-blocker-windows-x64.zip

  publish-release:
    name: Publish GitHub Release
    needs:
      - create-tag
      - build-release-asset
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release-asset
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-tag.outputs.tag }}
          name: Release ${{ needs.create-tag.outputs.tag }}
          target_commitish: main
          generate_release_notes: true
          files: |
            dist/screen-saver-blocker-windows-x64.zip
