name: PR Windows Build and Release

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  pr-build-check:
    name: PR build check (Windows)
    if: ${{ github.event.action != 'closed' }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

  create-tag:
    name: Auto-increment tag on merge
    if: ${{ github.event.action == 'closed' && github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.next_tag.outputs.value }}
      merge_sha: ${{ steps.merged_commit.outputs.value }}

    steps:
      - name: Checkout main with full history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute next patch tag
        id: next_tag
        shell: bash
        run: |
          semver_tags=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+(\.[0-9]+)?$' || true)

          if [[ -z "$semver_tags" ]]; then
            major=0
            minor=1
            patch=0
          else
            # Normaliza vX.Y para vX.Y.0 para ordenar corretamente.
            normalized_tags=$(printf "%s\n" "$semver_tags" | sed -E 's/^v([0-9]+\.[0-9]+)$/v\1.0/')
            latest_tag=$(printf "%s\n" "$normalized_tags" | sort -V | tail -n 1)

            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
            patch=$((patch + 1))
          fi

          next_tag="v${major}.${minor}.${patch}"

          # Evita colisão de tag (ex.: rerun ou concorrência eventual).
          while git rev-parse -q --verify "refs/tags/$next_tag" >/dev/null || \
                git ls-remote --tags origin "refs/tags/$next_tag" | grep -q "$next_tag"; do
            patch=$((patch + 1))
            next_tag="v${major}.${minor}.${patch}"
          done

          echo "value=$next_tag" >> "$GITHUB_OUTPUT"
          echo "Próxima tag: $next_tag"

      - name: Resolve merged commit sha
        id: merged_commit
        shell: bash
        run: |
          sha="${{ github.event.pull_request.merge_commit_sha }}"
          if [[ -z "$sha" ]]; then
            echo "merge_commit_sha não informado pelo evento."
            exit 1
          fi

          git cat-file -e "$sha^{commit}"
          echo "value=$sha" >> "$GITHUB_OUTPUT"
          echo "Commit mergeado: $sha"

      - name: Create and push tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next_tag.outputs.value }}" "${{ steps.merged_commit.outputs.value }}"
          git push origin "${{ steps.next_tag.outputs.value }}"

  build-release-asset:
    name: Build Windows release asset
    needs: create-tag
    runs-on: windows-latest

    steps:
      - name: Checkout created tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.tag }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Prepare, sign (optional) and zip exe
        shell: pwsh
        env:
          CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
          TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
        run: |
          $bin = "target/release/screen-saver-blocker-rust.exe"
          if (!(Test-Path $bin)) {
            throw "Binary not found at $bin"
          }

          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $exe = "dist/screen-saver-blocker-windows-x64.exe"
          Copy-Item $bin $exe

          # Assinatura opcional: só tenta assinar quando o certificado estiver configurado.
          if (-not [string]::IsNullOrWhiteSpace($env:CERT_PFX_BASE64)) {
            if ([string]::IsNullOrWhiteSpace($env:CERT_PASSWORD)) {
              throw "CERT_PASSWORD is empty while CERT_PFX_BASE64 is set"
            }

            $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
            [System.IO.File]::WriteAllBytes(
              $pfxPath,
              [System.Convert]::FromBase64String($env:CERT_PFX_BASE64)
            )

            $signtool = Get-ChildItem "C:/Program Files (x86)/Windows Kits/10/bin" -Filter signtool.exe -Recurse |
              Sort-Object FullName -Descending |
              Select-Object -First 1

            if (-not $signtool) {
              throw "signtool.exe not found on runner"
            }

            $timestampUrl = $env:TIMESTAMP_URL
            if ([string]::IsNullOrWhiteSpace($timestampUrl)) {
              $timestampUrl = "http://timestamp.digicert.com"
            }

            & $signtool.FullName sign /fd SHA256 /f $pfxPath /p $env:CERT_PASSWORD /tr $timestampUrl /td SHA256 $exe
            if ($LASTEXITCODE -ne 0) {
              throw "Code signing failed with exit code $LASTEXITCODE"
            }

            Remove-Item $pfxPath -Force
          } else {
            Write-Host "Certificate not configured. Skipping code signing."
          }

          $zipPath = "dist/screen-saver-blocker-windows-x64.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Add-Type -AssemblyName System.IO.Compression
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::Open($zipPath, [System.IO.Compression.ZipArchiveMode]::Create)
          try {
            $entryName = "screen-saver-blocker-windows-x64.exe"
            [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, $exe, $entryName) | Out-Null
          }
          finally {
            $zip.Dispose()
          }

          $zipRead = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
          try {
            $entry = $zipRead.Entries |
              Where-Object { $_.FullName -eq "screen-saver-blocker-windows-x64.exe" } |
              Select-Object -First 1
            if (-not $entry) {
              throw "Zip validation failed: .exe entry not found with expected name"
            }
          }
          finally {
            $zipRead.Dispose()
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-asset
          path: dist/screen-saver-blocker-windows-x64.zip

  publish-release:
    name: Publish GitHub Release
    needs:
      - create-tag
      - build-release-asset
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release-asset
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-tag.outputs.tag }}
          name: Release ${{ needs.create-tag.outputs.tag }}
          target_commitish: ${{ needs.create-tag.outputs.merge_sha }}
          generate_release_notes: true
          files: |
            dist/screen-saver-blocker-windows-x64.zip
